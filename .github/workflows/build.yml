name: Build FHIR IG

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Compile FSH
        run: ./_sushi.sh
      - name: Download IG Publisher
        run: ./_updatePublisher.sh
      - name: Build IG
        run: ./_genonce.sh
      - name: Run deterministic checks
        run: python3 scripts/check_mvp.py
      - uses: actions/upload-artifact@v4
        with:
          name: period-tracking-mvp-ig-site
          path: output/
