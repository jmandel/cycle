name: Checks

# Real build checks on every push. Generated examples/site artifacts are created
# in the runner, not committed.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: oven-sh/setup-bun@v2
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz zip
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Install Jekyll
        run: gem install jekyll --no-document
      - name: Deterministic integrity checks
        run: bun run check
      - name: Build static site
        run: bun run build:sitegen
        env:
          GRAPHVIZ_DOT: /usr/bin/dot
          VIEWER_BASE: https://cycle.fhir.me/view
          PAGES_CNAME: cycle.fhir.me
